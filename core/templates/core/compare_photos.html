
{% extends 'base.html' %}
{% block content %}
<h2>Porovnanie fotiek – {{ trainee.username }}</h2>

<form method="get">
  <div class="photo-select">
    {% for m in measurements %}
      <label>
        <input type="checkbox" name="photos" value="{{ m.id }}"
               {% if m.id|stringformat:"s" in selected_ids %}checked{% endif %}>
        <br>
        <img src="{{ m.photo.url }}" alt="Foto {{ m.date }}">
        <div style="font-size:0.9em;">{{ m.date }}</div>
      </label>
    {% endfor %}
  </div>
  <button type="submit" class="btn-green" style="margin-top:15px;">Porovnať vybrané</button>
</form>

{% if selected_measurements %}
  <h3 style="margin-top:30px;">Vybrané fotky</h3>
  <div class="photo-comparison">
    {% for m in selected_measurements %}
      <div class="compare-item">
        <img src="{{ m.photo.url }}" alt="Foto {{ m.date }}">
        <div style="margin-top:5px;">{{ m.date }}</div>
      </div>
    {% endfor %}
  </div>
{% endif %}

<a href="{% url 'user_list' %}" class="btn-blue" style="margin-top:20px; display:inline-block;">Späť na zoznam</a>
{% endblock %}
