{% extends 'base.html' %}
{% block title %}Pridať meranie{% endblock %}

{% block content %}
<h2>Pridať nové meranie</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-blue">Uložiť meranie</button>
</form>

<script>
    document.addEventListener('DOMContentLoaded', (event) => {
        const dateInput = document.getElementById('id_date');
        
        // Funkcia na formátovanie dátumu na YYYY-MM-DD
        const formatDate = (date) => {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        // Ak je pole pre dátum prázdne, automaticky ho vyplní aktuálnym dátumom
        if (!dateInput.value) {
            dateInput.value = formatDate(new Date());
        }
    });
</script>

{% endblock %}
