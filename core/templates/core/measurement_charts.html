{% extends 'base.html' %}
{% load static %}

{% block title %}Graf meraní - {{ other_user.username }}{% endblock %}

{% block content %}
<h2>Graf vývoja - {{ other_user.username }}</h2>

<div style="height:400px;">
    <canvas id="measurementChart"></canvas>
</div>

<a href="{% url 'measurement_list' %}" class="btn-blue">Späť na zoznam</a>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // Dáta zo servera
    const dates = {{ dates|safe }};
    const weights = {{ weights|safe }};
    const waists = {{ waists|safe }};
    const chests = {{ chests|safe }};
    const biceps = {{ biceps|safe }};
    const thighs = {{ thighs|safe }};
    const calfs = {{ calfs|safe }};   

    const ctx = document.getElementById('measurementChart').getContext('2d');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: dates,
            datasets: [
                { label: 'Váha', data: weights, borderColor: 'blue', fill: false, tension: 0.3 },
                { label: 'Pás', data: waists, borderColor: 'green', fill: false, tension: 0.3 },
                { label: 'Hrudník', data: chests, borderColor: 'red', fill: false, tension: 0.3 },
                { label: 'Biceps', data: biceps, borderColor: 'orange', fill: false, tension: 0.3 },
                { label: 'Stehno', data: thighs, borderColor: 'purple', fill: false, tension: 0.3 },
                { label: 'Lýtko', data: calfs, borderColor: 'brown', fill: false, tension: 0.3 },
            ]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom' } },
            scales: {
                x: { title: { display: true, text: 'Dátum' } },
                y: { title: { display: true, text: 'cm/kg' }, beginAtZero: false }
            }
        }
    });
</script>
{% endblock %}
